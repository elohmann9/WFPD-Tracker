<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFPD – Apparatus Committee</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C0392B;
  --red-dark: #7B241C;
  --red-bright: #E74C3C;
  --gold: #F0A500;
  --charcoal: #141416;
  --dark: #1E1E20;
  --panel: #252528;
  --card-bg: #2C2C30;
  --border: #3A3A3E;
  --border-light: #48484E;
  --silver: #8E8E95;
  --muted: #606068;
  --light: #E8E8F0;
  --white: #FFFFFF;

  --s-new: #3B82F6;
  --s-review: #A855F7;
  --s-bid: #F59E0B;
  --s-ordered: #10B981;
  --s-complete: #6B7280;

  --p-urgent: #EF4444;
  --p-high: #F97316;
  --p-medium: #EAB308;
  --p-low: #22C55E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--charcoal);
  color: var(--light);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 60%, #922B21 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0 28px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.015) 20px,
    rgba(255,255,255,0.015) 40px
  );
  pointer-events: none;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.dept-shield {
  width: 42px;
  height: 42px;
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.header-titles { display: flex; flex-direction: column; }

.dept-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: white;
  line-height: 1;
}

.committee-name {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-top: 2px;
}

.header-right { display: flex; align-items: center; gap: 16px; }

.stat-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 6px 14px;
}

.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--gold);
  line-height: 1;
}

.stat-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

.add-btn {
  background: var(--gold);
  color: #1a1a1a;
  border: none;
  border-radius: 8px;
  padding: 10px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.add-btn:hover { background: #FFB820; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,165,0,0.4); }

/* ── FILTER BAR ── */
.filter-bar {
  position: relative;
  z-index: 9;
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}

.filter-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--silver);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(240,165,0,0.08);
}

/* ── BOARD ── */
.board-scroll {
  position: relative;
  z-index: 1;
  overflow-x: auto;
  padding: 24px 28px 48px;
}

.board {
  display: flex;
  gap: 18px;
  min-width: max-content;
  align-items: flex-start;
}

/* ── BUCKET ── */
.bucket {
  width: 290px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  animation: fadeUp 0.4s ease both;
}

.bucket:nth-child(1) { animation-delay: 0.05s; }
.bucket:nth-child(2) { animation-delay: 0.1s; }
.bucket:nth-child(3) { animation-delay: 0.15s; }
.bucket:nth-child(4) { animation-delay: 0.2s; }
.bucket:nth-child(5) { animation-delay: 0.25s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.bucket-header {
  border-radius: 10px 10px 0 0;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.bucket-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -55deg, transparent, transparent 8px,
    rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 16px
  );
}

.bucket-left { display: flex; align-items: center; gap: 10px; position: relative; }

.bucket-icon { font-size: 18px; }

.bucket-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: white;
}

.bucket-count {
  background: rgba(0,0,0,0.3);
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 2px 9px;
  border-radius: 12px;
  position: relative;
  min-width: 28px;
  text-align: center;
}

.bucket-body {
  background: var(--panel);
  border-radius: 0 0 10px 10px;
  border: 1px solid var(--border);
  border-top: none;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 80px;
}

/* Bucket accent colors */
.b-new .bucket-header    { background: linear-gradient(135deg, #1D4ED8, #3B82F6); }
.b-review .bucket-header  { background: linear-gradient(135deg, #7E22CE, #A855F7); }
.b-bid .bucket-header     { background: linear-gradient(135deg, #B45309, #F59E0B); }
.b-ordered .bucket-header { background: linear-gradient(135deg, #065F46, #10B981); }
.b-complete .bucket-header{ background: linear-gradient(135deg, #374151, #6B7280); }

/* ── CARD ── */
.card {
  background: var(--card-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 13px 14px 11px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 8px 0 0 8px;
}

.b-new .card::before    { background: var(--s-new); }
.b-review .card::before  { background: var(--s-review); }
.b-bid .card::before     { background: var(--s-bid); }
.b-ordered .card::before { background: var(--s-ordered); }
.b-complete .card::before{ background: var(--s-complete); }

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  border-color: var(--border-light);
}

.card-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
}

.card-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--light);
  line-height: 1.4;
  margin-bottom: 10px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--border);
  color: var(--silver);
}

.card-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

.card-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-key {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.meta-val {
  font-size: 11px;
  font-weight: 600;
  color: var(--silver);
}

.meta-val.due-soon { color: #F59E0B; }
.meta-val.overdue  { color: #EF4444; }

/* Priority badge */
.priority-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
}

.p-urgent { background: rgba(239,68,68,0.15); color: #EF4444; }
.p-high   { background: rgba(249,115,22,0.15); color: #F97316; }
.p-medium { background: rgba(234,179,8,0.15);  color: #EAB308; }
.p-low    { background: rgba(34,197,94,0.15);  color: #22C55E; }

/* Status selector on card */
.card-status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 9px;
}

.status-select {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--silver);
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 6px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
  max-width: 130px;
}

.status-select:hover { border-color: var(--gold); }

/* Notes indicator */
.notes-indicator {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Add card button */
.add-card-btn {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  background: transparent;
  width: 100%;
}

.add-card-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(240,165,0,0.05);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--panel);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  transform: translateY(20px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  border-radius: 14px 14px 0 0;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
}

.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: white;
}

.modal-close {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.modal-close:hover { background: rgba(255,255,255,0.25); }

.modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }

.field-group { display: flex; flex-direction: column; gap: 6px; }

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--silver);
}

.field-input, .field-select, .field-textarea {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  color: var(--light);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 10px 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

.field-input:focus, .field-select:focus, .field-textarea:focus {
  border-color: var(--gold);
}

.field-textarea { resize: vertical; min-height: 80px; }
.field-select option { background: var(--card-bg); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.modal-footer {
  padding: 0 22px 22px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn-cancel {
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--silver);
  border-radius: 8px;
  padding: 10px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cancel:hover { border-color: var(--silver); color: var(--light); }

.btn-save {
  background: var(--gold);
  border: none;
  color: #1a1a1a;
  border-radius: 8px;
  padding: 10px 24px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-save:hover { background: #FFB820; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 20px 10px;
  color: var(--muted);
  font-size: 12px;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--silver); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="dept-shield">🚒</div>
    <div class="header-titles">
      <div class="dept-name">WFPD</div>
      <div class="committee-name">Apparatus Committee · Project Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-chip">
      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="stat-urgent">0</div>
      <div class="stat-label">Urgent</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="stat-complete">0</div>
      <div class="stat-label">Complete</div>
    </div>
    <button class="add-btn" onclick="openModal()">＋ New Project</button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">All Projects</button>
  <button class="filter-btn" onclick="setFilter('urgent', this)">🔴 Urgent</button>
  <button class="filter-btn" onclick="setFilter('high', this)">🟠 High Priority</button>
  <button class="filter-btn" onclick="setFilter('apparatus', this)">Apparatus</button>
  <button class="filter-btn" onclick="setFilter('equipment', this)">Equipment</button>

</div>

<!-- BOARD -->
<div class="board-scroll">
  <div class="board" id="board">

    <div class="bucket b-new" id="bucket-new">
      <div class="bucket-header">
        <div class="bucket-left">
          <span class="bucket-icon">📥</span>
          <span class="bucket-title">New Requests</span>
        </div>
        <span class="bucket-count" id="count-new">0</span>
      </div>
      <div class="bucket-body" id="cards-new">
        <div class="empty-state">No requests yet</div>
      </div>
    </div>

    <div class="bucket b-review" id="bucket-review">
      <div class="bucket-header">
        <div class="bucket-left">
          <span class="bucket-icon">🔍</span>
          <span class="bucket-title">Under Review</span>
        </div>
        <span class="bucket-count" id="count-review">0</span>
      </div>
      <div class="bucket-body" id="cards-review">
        <div class="empty-state">No items under review</div>
      </div>
    </div>

    <div class="bucket b-bid" id="bucket-bid">
      <div class="bucket-header">
        <div class="bucket-left">
          <span class="bucket-icon">💰</span>
          <span class="bucket-title">Bid & Procurement</span>
        </div>
        <span class="bucket-count" id="count-bid">0</span>
      </div>
      <div class="bucket-body" id="cards-bid">
        <div class="empty-state">No active bids</div>
      </div>
    </div>

    <div class="bucket b-ordered" id="bucket-ordered">
      <div class="bucket-header">
        <div class="bucket-left">
          <span class="bucket-icon">✅</span>
          <span class="bucket-title">Approved & Ordered</span>
        </div>
        <span class="bucket-count" id="count-ordered">0</span>
      </div>
      <div class="bucket-body" id="cards-ordered">
        <div class="empty-state">Nothing ordered yet</div>
      </div>
    </div>

    <div class="bucket b-complete" id="bucket-complete">
      <div class="bucket-header">
        <div class="bucket-left">
          <span class="bucket-icon">🏁</span>
          <span class="bucket-title">Complete</span>
        </div>
        <span class="bucket-count" id="count-complete">0</span>
      </div>
      <div class="bucket-body" id="cards-complete">
        <div class="empty-state">No completed projects</div>
      </div>
    </div>

  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-text">New Project</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="field-group">
        <label class="field-label">Project Title *</label>
        <input class="field-input" id="f-title" placeholder="e.g. Portable radio replacement – Engine 3" />
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Category / Tag</label>
          <select class="field-select" id="f-tag">
            <option value="Apparatus">Apparatus</option>
            <option value="Equipment">Equipment</option>

            <option value="Budget">Budget Item</option>
            <option value="Grant">Grant Funded</option>
            <option value="Contract">Contract</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Priority</label>
          <select class="field-select" id="f-priority">
            <option value="urgent">🔴 Urgent</option>
            <option value="high">🟠 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Assigned To</label>
          <input class="field-input" id="f-assigned" placeholder="e.g. Capt. Harris" />
        </div>
        <div class="field-group">
          <label class="field-label">Due Date</label>
          <input class="field-input" id="f-due" type="date" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Bucket / Stage</label>
        <select class="field-select" id="f-bucket">
          <option value="new">📥 New Requests</option>
          <option value="review">🔍 Under Review</option>
          <option value="bid">💰 Bid & Procurement</option>
          <option value="ordered">✅ Approved & Ordered</option>
          <option value="complete">🏁 Complete</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Notes</label>
        <textarea class="field-textarea" id="f-notes" placeholder="Vendor info, budget amount, context..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save Project</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let projects = [];
let nextId = 1;
let editingId = null;
let activeFilter = 'all';

const bucketMap = {
  new: { label: 'New Requests', cls: 'b-new' },
  review: { label: 'Under Review', cls: 'b-review' },
  bid: { label: 'Bid & Procurement', cls: 'b-bid' },
  ordered: { label: 'Approved & Ordered', cls: 'b-ordered' },
  complete: { label: 'Complete', cls: 'b-complete' },
};

const priorityMap = {
  urgent: { label: 'Urgent', cls: 'p-urgent', dot: '🔴' },
  high:   { label: 'High',   cls: 'p-high',   dot: '🟠' },
  medium: { label: 'Medium', cls: 'p-medium',  dot: '🟡' },
  low:    { label: 'Low',    cls: 'p-low',     dot: '🟢' },
};

// ── SEED DATA ──
const seed = [
  { title: 'Portable radio replacement – Engine 3', tag: 'Equipment', priority: 'urgent', assigned: 'Capt. Harris', due: '2026-04-15', bucket: 'new', notes: 'Current radios failing during ops. Need 4 units minimum.' },

  { title: 'Spec writing – 2026 Type 1 Engine replacement', tag: 'Apparatus', priority: 'urgent', assigned: 'Chief Davis', due: '2026-03-31', bucket: 'review', notes: 'Committee to review spec draft before sending to bid.' },
  { title: 'Bid solicitation – Ladder Truck replacement', tag: 'Apparatus', priority: 'high', assigned: 'Chief Davis', due: '2026-03-31', bucket: 'bid', notes: 'Bids due back by end of month. 3 vendors contacted.' },
  { title: 'SCBA replacement – 6 units', tag: 'Equipment', priority: 'high', assigned: 'Lt. Morales', due: '2026-06-01', bucket: 'ordered', notes: 'PO submitted. Estimated delivery June 2026.' },

];

seed.forEach(p => {
  projects.push({ ...p, id: nextId++ });
});

// ── RENDER ──
function render() {
  const buckets = ['new','review','bid','ordered','complete'];

  let filtered = projects;
  if (activeFilter !== 'all') {
    filtered = projects.filter(p => {
      if (activeFilter === 'urgent') return p.priority === 'urgent';
      if (activeFilter === 'high') return p.priority === 'high' || p.priority === 'urgent';
      if (activeFilter === 'apparatus') return p.tag === 'Apparatus';
      if (activeFilter === 'equipment') return p.tag === 'Equipment';

      return true;
    });
  }

  buckets.forEach(b => {
    const container = document.getElementById('cards-' + b);
    const countEl = document.getElementById('count-' + b);
    const items = filtered.filter(p => p.bucket === b);
    countEl.textContent = items.length;

    if (items.length === 0) {
      const msgs = { new:'No requests yet', review:'No items under review', bid:'No active bids', ordered:'Nothing ordered yet', complete:'No completed projects' };
      container.innerHTML = `<div class="empty-state">${msgs[b]}</div>`;
    } else {
      container.innerHTML = items.map(p => cardHTML(p)).join('');
    }
    // add card button
    container.innerHTML += `<button class="add-card-btn" onclick="openModal('${b}')">＋ Add project</button>`;
  });

  updateStats();
}

function cardHTML(p) {
  const pri = priorityMap[p.priority];
  const dueStr = formatDue(p.due);
  const dueClass = getDueClass(p.due);
  const numStr = 'WFP-' + String(p.id).padStart(3, '0');
  const notesIcon = p.notes ? '📝 Notes' : '';

  return `
  <div class="card" onclick="openEdit(${p.id})">
    <div class="card-num">${numStr}</div>
    <div class="card-title">${p.title}</div>
    <div class="card-tags">
      <span class="tag">${p.tag}</span>
      <span class="priority-badge ${pri.cls}">${pri.dot} ${pri.label}</span>
    </div>
    <div class="card-divider"></div>
    <div class="card-meta">
      <div class="meta-item">
        <span class="meta-key">Assigned To</span>
        <span class="meta-val">${p.assigned || '—'}</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Due Date</span>
        <span class="meta-val ${dueClass}">${dueStr}</span>
      </div>
    </div>
    <div class="card-status-row" onclick="event.stopPropagation()">
      <span class="notes-indicator">${notesIcon}</span>
      <select class="status-select" onchange="moveBucket(${p.id}, this.value)">
        <option value="new"     ${p.bucket==='new'?'selected':''}>📥 New Request</option>
        <option value="review"  ${p.bucket==='review'?'selected':''}>🔍 Under Review</option>
        <option value="bid"     ${p.bucket==='bid'?'selected':''}>💰 Bid & Procurement</option>
        <option value="ordered" ${p.bucket==='ordered'?'selected':''}>✅ Approved & Ordered</option>
        <option value="complete"${p.bucket==='complete'?'selected':''}>🏁 Complete</option>
      </select>
    </div>
  </div>`;
}

function formatDue(due) {
  if (!due) return '—';
  const d = new Date(due + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getDueClass(due) {
  if (!due) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T12:00:00');
  const diff = (d - today) / (1000*60*60*24);
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'due-soon';
  return '';
}

function updateStats() {
  const active = projects.filter(p => p.bucket !== 'complete').length;
  const urgent = projects.filter(p => p.priority === 'urgent' && p.bucket !== 'complete').length;
  const complete = projects.filter(p => p.bucket === 'complete').length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('stat-complete').textContent = complete;
}

// ── ACTIONS ──
function moveBucket(id, bucket) {
  const p = projects.find(x => x.id === id);
  if (p) { p.bucket = bucket; render(); }
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── MODAL ──
function openModal(defaultBucket) {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'New Project';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-tag').value = 'Equipment';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-assigned').value = '';
  document.getElementById('f-due').value = '';
  document.getElementById('f-bucket').value = defaultBucket || 'new';
  document.getElementById('f-notes').value = '';
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'Edit Project';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-tag').value = p.tag;
  document.getElementById('f-priority').value = p.priority;
  document.getElementById('f-assigned').value = p.assigned || '';
  document.getElementById('f-due').value = p.due || '';
  document.getElementById('f-bucket').value = p.bucket;
  document.getElementById('f-notes').value = p.notes || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a project title.'); return; }

  const data = {
    title,
    tag: document.getElementById('f-tag').value,
    priority: document.getElementById('f-priority').value,
    assigned: document.getElementById('f-assigned').value.trim(),
    due: document.getElementById('f-due').value,
    bucket: document.getElementById('f-bucket').value,
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (editingId) {
    const idx = projects.findIndex(x => x.id === editingId);
    if (idx !== -1) projects[idx] = { ...projects[idx], ...data };
  } else {
    projects.push({ ...data, id: nextId++ });
  }

  closeModal();
  render();
}

// ── INIT ──
render();
</script>
</body>
</html>
